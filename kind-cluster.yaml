kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    labels:
      role: app
  - role: worker
    labels:
      role: app
  - role: worker
    labels:
      role: db
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          taints:
            - key: "workload"
              value: "database"
              effect: "NoSchedule"
