name: CD — Deploy to EKS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name eks-devops-project \
            --region us-east-1

      - name: Install Helm v3
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.3'

      - name: Install helmfile + helm-diff
        run: |
          curl -fsSL -o helmfile.tar.gz \
            "https://github.com/helmfile/helmfile/releases/download/v1.1.0/helmfile_1.1.0_linux_amd64.tar.gz"
          tar xf helmfile.tar.gz
          sudo mv helmfile /usr/local/bin/
          helmfile version
          helm plugin install https://github.com/databus23/helm-diff --version v3.9.14 || true

      - name: Deploy monitoring
        run: |
          # En cluster nuevo: sync (sin diff). En cluster existente: apply.
          if kubectl get crd prometheuses.monitoring.coreos.com &>/dev/null; then
            helmfile apply --selector name=kube-prometheus-stack
          else
            echo "CRDs not found — using sync for first install"
            helmfile sync --selector name=kube-prometheus-stack
          fi

      - name: Deploy apps
        run: helmfile apply --selector 'name!=kube-prometheus-stack'