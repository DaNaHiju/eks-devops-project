apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # This name must match .Values.dbSecret.name in values.yaml ("db-credentials")
    # and the secretKeyRef names in deployment.yaml
    name: {{ .Values.dbSecret.name }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: eks-devops/production/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: eks-devops/production/db-credentials
        property: password
