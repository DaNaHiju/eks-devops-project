replicaCount: 2

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeAffinity:
  enabled: true

# Variables de entorno no-sensitivas
config:
  dbHost: "my-app-database"
  dbPort: "5432"
  dbName: "appdb"

# Referencia al Secret creado por ExternalSecrets (Seccion 9)
dbSecret:
  name: "db-credentials"

metrics:
  enabled: true


