postgresql:
  auth:
    postgresPassword: "changeme123"
    username: "appuser"
    password: "changeme123"
    database: "appdb"

  primary:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    persistence:
      enabled: true
      size: 1Gi

    tolerations:
      - key: "workload"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - db

  metrics:
    enabled: true

vpa:
  enabled: true