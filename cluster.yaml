apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-devops-project
  region: us-east-1
  version: "1.31"

managedNodeGroups:

  - name: app-nodes
    instanceType: t3.micro
    minSize: 1
    maxSize: 5
    desiredCapacity: 2
    labels:
      role: app

  - name: db-nodes
    instanceType: t3.micro
    minSize: 1
    maxSize: 2
    desiredCapacity: 1
    labels:
      role: db
